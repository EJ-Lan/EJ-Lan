<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 230" width="800" height="230">
  <defs>
    <style>
      .bg       { fill: #1e1e2e; }
      .bar-bg   { fill: #181825; }
      .border   { fill: none; stroke: #45475a; stroke-width: 1; }
      .bar-text { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 11px; fill: #6c7086; }
      .t        { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12.5px; }
      .scanline { fill: none; stroke: #cdd6f4; stroke-width: 0.35; opacity: 0.025; }

      .c-text  { fill: #cdd6f4; }
      .c-sub   { fill: #6c7086; }
      .c-grn   { fill: #a6e3a1; }
      .c-blue  { fill: #89b4fa; }
      .c-lav   { fill: #b4befe; }
      .c-peach { fill: #fab387; }
      .c-yel   { fill: #f9e2af; }
      .c-teal  { fill: #94e2d5; }
      .c-mauve { fill: #cba6f7; }

      .l0  { opacity:0; animation: fadeIn 0.05s 0.2s  forwards; }
      .l1  { opacity:0; animation: fadeIn 0.05s 0.8s  forwards; }
      .l2  { opacity:0; animation: fadeIn 0.05s 1.5s  forwards; }
      .l3  { opacity:0; animation: fadeIn 0.05s 2.1s  forwards; }
      .l4  { opacity:0; animation: fadeIn 0.05s 2.7s  forwards; }
      .l5  { opacity:0; animation: fadeIn 0.05s 3.3s  forwards; }
      .l6  { opacity:0; animation: fadeIn 0.05s 3.9s  forwards; }
      .l7  { opacity:0; animation: fadeIn 0.05s 4.4s  forwards; }
      .l8  { opacity:0; animation: fadeIn 0.05s 4.9s  forwards; }
      .cur { opacity:0; animation: blink  0.9s  5.1s  step-end infinite; }

      @keyframes fadeIn { to { opacity: 1; } }
      @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }

      .dot-r { fill: #f38ba8; }
      .dot-y { fill: #f9e2af; }
      .dot-g { fill: #a6e3a1; }
    </style>
    <clipPath id="clip"><rect x="0" y="0" width="800" height="230" rx="12"/></clipPath>
  </defs>

  <rect class="bg" x="0" y="0" width="800" height="230" rx="12"/>

  <g clip-path="url(#clip)">
    <line class="scanline" x1="0" y1="44"  x2="800" y2="44"/>
    <line class="scanline" x1="0" y1="54"  x2="800" y2="54"/>
    <line class="scanline" x1="0" y1="64"  x2="800" y2="64"/>
    <line class="scanline" x1="0" y1="74"  x2="800" y2="74"/>
    <line class="scanline" x1="0" y1="84"  x2="800" y2="84"/>
    <line class="scanline" x1="0" y1="94"  x2="800" y2="94"/>
    <line class="scanline" x1="0" y1="104" x2="800" y2="104"/>
    <line class="scanline" x1="0" y1="114" x2="800" y2="114"/>
    <line class="scanline" x1="0" y1="124" x2="800" y2="124"/>
    <line class="scanline" x1="0" y1="134" x2="800" y2="134"/>
    <line class="scanline" x1="0" y1="144" x2="800" y2="144"/>
    <line class="scanline" x1="0" y1="154" x2="800" y2="154"/>
    <line class="scanline" x1="0" y1="164" x2="800" y2="164"/>
    <line class="scanline" x1="0" y1="174" x2="800" y2="174"/>
    <line class="scanline" x1="0" y1="184" x2="800" y2="184"/>
    <line class="scanline" x1="0" y1="194" x2="800" y2="194"/>
    <line class="scanline" x1="0" y1="204" x2="800" y2="204"/>
    <line class="scanline" x1="0" y1="214" x2="800" y2="214"/>
    <line class="scanline" x1="0" y1="224" x2="800" y2="224"/>
  </g>

  <rect class="bar-bg" x="0" y="0" width="800" height="34" rx="12"/>
  <rect class="bar-bg" x="0" y="22" width="800" height="12"/>
  <circle class="dot-r" cx="20" cy="17" r="5.5"/>
  <circle class="dot-y" cx="40" cy="17" r="5.5"/>
  <circle class="dot-g" cx="60" cy="17" r="5.5"/>
  <text class="bar-text" x="400" y="21" text-anchor="middle">ervin@github — bash — 120×30</text>

  <rect class="border" x="0.5" y="0.5" width="799" height="229" rx="12"/>

  <!-- boot line 1 -->
  <g class="l0">
    <text class="t" x="24" y="60">
      <tspan class="c-grn">[  OK  ]</tspan><tspan class="c-sub">  starting </tspan><tspan class="c-mauve">ervin.lanada</tspan><tspan class="c-sub"> — systems engineer</tspan>
    </text>
  </g>

  <!-- boot line 2 -->
  <g class="l1">
    <text class="t" x="24" y="78">
      <tspan class="c-grn">[  OK  ]</tspan><tspan class="c-sub">  loaded: </tspan><tspan class="c-peach">rust</tspan><tspan class="c-sub"> · </tspan><tspan class="c-peach">c++</tspan><tspan class="c-sub"> · </tspan><tspan class="c-teal">linux</tspan><tspan class="c-sub"> · </tspan><tspan class="c-teal">networking</tspan><tspan class="c-sub"> · </tspan><tspan class="c-teal">distributed systems</tspan>
    </text>
  </g>

  <!-- prompt: whoami -->
  <g class="l2">
    <text class="t" x="24" y="104">
      <tspan class="c-blue">ervin@github</tspan><tspan class="c-sub">:</tspan><tspan class="c-yel">~</tspan><tspan class="c-sub">$ </tspan><tspan class="c-lav">whoami</tspan>
    </text>
  </g>

  <!-- whoami output -->
  <g class="l3">
    <text class="t" x="24" y="122">
      <tspan class="c-sub">  → </tspan><tspan class="c-text">software engineer · edmonton, ab · building systems from the ground up</tspan>
    </text>
  </g>

  <!-- prompt: grind -->
  <g class="l4">
    <text class="t" x="24" y="148">
      <tspan class="c-blue">ervin@github</tspan><tspan class="c-sub">:</tspan><tspan class="c-yel">~</tspan><tspan class="c-sub">$ </tspan><tspan class="c-lav">cat grind.log</tspan>
    </text>
  </g>

  <!-- grind output -->
  <g class="l5">
    <text class="t" x="24" y="166">
      <tspan class="c-sub">  → </tspan><tspan class="c-peach">codeforces c++</tspan><tspan class="c-sub"> · </tspan><tspan class="c-peach">rust systems</tspan><tspan class="c-sub"> · </tspan><tspan class="c-teal">os internals</tspan><tspan class="c-sub"> · </tspan><tspan class="c-teal">distributed systems</tspan>
    </text>
  </g>

  <!-- prompt: roadmap -->
  <g class="l6">
    <text class="t" x="24" y="192">
      <tspan class="c-blue">ervin@github</tspan><tspan class="c-sub">:</tspan><tspan class="c-yel">~</tspan><tspan class="c-sub">$ </tspan><tspan class="c-lav">ls ~/roadmap</tspan>
    </text>
  </g>

  <!-- roadmap output -->
  <g class="l7">
    <text class="t" x="24" y="210">
      <tspan class="c-mauve">systems-tooling/</tspan><tspan class="c-sub">   </tspan><tspan class="c-mauve">distributed-systems/</tspan><tspan class="c-sub">   </tspan><tspan class="c-mauve">open-source/</tspan><tspan class="c-sub">   </tspan><tspan class="c-mauve">compilers/</tspan>
    </text>
  </g>

  <!-- final prompt line -->
  <g class="l8">
    <text class="t" x="24" y="210">
      <tspan class="c-blue">ervin@github</tspan><tspan class="c-sub">:</tspan><tspan class="c-yel">~</tspan><tspan class="c-sub">$ </tspan>
    </text>
  </g>

  <!-- blinking cursor -->
  <rect class="cur" x="107" y="198" width="8" height="15" fill="#b4befe"/>
</svg>
